stages:
  - quality
  - test
  - build
  - deploy

variables:
  DOCKER_DRIVER: overlay2
  DOCKER_TLS_CERTDIR: "/certs"
  IMAGE_NAME: $CI_REGISTRY_IMAGE
  GO_VERSION: "1.26"

default:
  image: golang:1.26-alpine
  before_script:
    - apk add --no-cache git curl
  cache:
    key: go-mod-${CI_COMMIT_REF_SLUG}
    paths:
      - .go/pkg/mod/
    policy: pull-push
  variables:
    GOPATH: ${CI_PROJECT_DIR}/.go

# ─── Quality ────────────────────────────────────────────────────────────────

lint:
  stage: quality
  image: golangci/golangci-lint:v2.11
  script:
    - golangci-lint run ./...
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"

generated-check:
  stage: quality
  before_script:
    - apk add --no-cache git curl
    - go install github.com/bufbuild/buf/cmd/buf@v1.51.0
    - go install github.com/sqlc-dev/sqlc/cmd/sqlc@v1.30.0
    - go install go.uber.org/mock/mockgen@v0.6.0
  script:
    - buf generate
    - git diff --exit-code gen/proto || (echo "Proto files out of date. Run 'task generate:proto'" && exit 1)
    - git diff --exit-code gen/ts || (echo "TS generated files out of date. Run 'task generate:proto'" && exit 1)
    - sqlc generate
    - git diff --exit-code gen/sqlc || (echo "SQLC files out of date. Run 'task generate:sqlc'" && exit 1)
    - go generate ./...
    - git diff --exit-code internal/shared/mocks || (echo "Mocks out of date. Run 'task generate:mocks'" && exit 1)
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"

# ─── Test ───────────────────────────────────────────────────────────────────

unit-test:
  stage: test
  script:
    - go test -race -count=1 -coverprofile=coverage.out ./internal/...
    - go tool cover -func=coverage.out
  coverage: '/total:\s+\(statements\)\s+(\d+\.\d+)%/'
  artifacts:
    paths:
      - coverage.out
    expire_in: 1 week
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"

integration-test:
  stage: test
  services:
    - name: postgres:16-alpine
      alias: postgres
      variables:
        POSTGRES_USER: test
        POSTGRES_PASSWORD: test
        POSTGRES_DB: test
    - name: redis:7-alpine
      alias: redis
    - name: rabbitmq:3-alpine
      alias: rabbitmq
      variables:
        RABBITMQ_DEFAULT_USER: guest
        RABBITMQ_DEFAULT_PASS: guest
  variables:
    DATABASE_URL: "postgres://test:test@postgres:5432/test?sslmode=disable"
    REDIS_URL: "redis://redis:6379"
    RABBITMQ_URL: "amqp://guest:guest@rabbitmq:5672/"
  script:
    - go test -race -count=1 -tags=integration ./...
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      when: manual
      allow_failure: true
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_TAG

# ─── Build ──────────────────────────────────────────────────────────────────

build:
  stage: build
  image: docker:24
  services:
    - docker:24-dind
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - |
      TAG=${CI_COMMIT_TAG:-$CI_COMMIT_SHORT_SHA}
      docker build -t $IMAGE_NAME:$TAG -t $IMAGE_NAME:latest .
      docker push $IMAGE_NAME:$TAG
      docker push $IMAGE_NAME:latest
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_TAG

# ─── Deploy ─────────────────────────────────────────────────────────────────

deploy-staging:
  stage: deploy
  image: alpine:3.21
  before_script:
    - apk add --no-cache openssh-client
    - eval $(ssh-agent -s)
    - echo "$STAGING_SSH_KEY" | tr -d '\r' | ssh-add -
    - mkdir -p ~/.ssh && chmod 700 ~/.ssh
    - echo "$STAGING_HOST_KEY" >> ~/.ssh/known_hosts
  script:
    - |
      ssh $STAGING_USER@$STAGING_HOST "
        cd $STAGING_DIR &&
        docker compose -f deploy/docker-compose.yml run --rm app goose -dir /db/migrations postgres \\\$DATABASE_URL up &&
        IMAGE_TAG=${CI_COMMIT_SHORT_SHA} docker compose -f deploy/docker-compose.yml pull app &&
        IMAGE_TAG=${CI_COMMIT_SHORT_SHA} docker compose -f deploy/docker-compose.yml up -d --no-deps app
      "
  environment:
    name: staging
    url: https://$STAGING_DOMAIN
  rules:
    - if: $CI_COMMIT_BRANCH == "main"

deploy-production:
  stage: deploy
  image: alpine:3.21
  before_script:
    - apk add --no-cache openssh-client
    - eval $(ssh-agent -s)
    - echo "$PROD_SSH_KEY" | tr -d '\r' | ssh-add -
    - mkdir -p ~/.ssh && chmod 700 ~/.ssh
    - echo "$PROD_HOST_KEY" >> ~/.ssh/known_hosts
  script:
    - |
      ssh $PROD_USER@$PROD_HOST "
        cd $PROD_DIR &&
        docker compose -f deploy/docker-compose.yml run --rm app goose -dir /db/migrations postgres \\\$DATABASE_URL up &&
        IMAGE_TAG=${CI_COMMIT_TAG} docker compose -f deploy/docker-compose.yml pull app &&
        IMAGE_TAG=${CI_COMMIT_TAG} docker compose -f deploy/docker-compose.yml up -d --no-deps app
      "
  environment:
    name: production
    url: https://$PROD_DOMAIN
  when: manual
  rules:
    - if: $CI_COMMIT_TAG
