pre-commit:
  parallel: true
  commands:
    lint:
      glob: "*.go"
      exclude: "^gen/"
      run: golangci-lint run --fix --new-from-rev=HEAD ./...
    generated:
      run: |
        buf generate
        sqlc generate
        go generate ./...
        git diff --exit-code gen/ internal/shared/mocks/
      fail_text: "Generated code is stale. Run 'task generate' and commit."

pre-push:
  commands:
    test:
      run: go test -race -count=1 ./internal/...
      fail_text: "Tests failed. Fix before pushing."
