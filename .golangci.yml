version: "2"

run:
  timeout: 5m

linters:
  default: none
  enable:
    - errcheck
    - gosimple
    - govet
    - staticcheck
    - unused
    - revive

linters-settings:
  revive:
    rules:
      - name: unexported-return
        disabled: true

issues:
  exclude-dirs: [gen, tmp, vendor]
  max-issues-per-linter: 50
  max-same-issues: 5
