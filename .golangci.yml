version: "2"

run:
  timeout: 5m

linters:
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gocritic
    - misspell
    - revive
    - unconvert
    - unparam

linters-settings:
  gocritic:
    enabled-tags: [diagnostic, style, performance]
  revive:
    rules:
      - name: unexported-return
        disabled: true

issues:
  exclude-dirs: [gen, tmp, vendor]
  max-issues-per-linter: 50
  max-same-issues: 5
